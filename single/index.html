<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Release</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; cursor: none; overflow-x: hidden; }
        #cursor {
            width: 20px; height: 20px; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.1s;
        }
        .dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3); opacity: 0.6; z-index: -1;
            transition: background-image 1s ease-in-out;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        body.is-transitioning #transition-layer { opacity: 1; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="transition-layer"></div>
    <div id="bg-layer" class="dynamic-bg"></div>

    <nav class="fixed top-0 w-full z-50 py-6 px-6">
        <a href="/music" class="text-[10px] uppercase tracking-[0.5em] font-bold text-gray-400 hover:text-white transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Back to Catalog
        </a>
    </nav>

    <main class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-4xl w-full grid md:grid-cols-2 gap-12 items-center">
            
            <div class="relative group">
                <img id="song-cover" src="" alt="" class="w-full aspect-square object-cover rounded-xl shadow-2xl scale-100 group-hover:scale-[1.02] transition-transform duration-700">
                <div class="absolute -inset-4 bg-white/5 blur-2xl -z-10 opacity-50"></div>
            </div>

            <div class="space-y-8">
                <div class="space-y-2">
                    <p id="song-date" class="text-cyan-400 text-[10px] font-bold tracking-[0.4em] uppercase"></p>
                    <h1 id="song-title" class="text-5xl md:text-7xl font-black italic tracking-tighter leading-none uppercase"></h1>
                </div>

                <div id="links-container" class="space-y-3">
                    </div>

                <p class="text-[9px] text-gray-500 tracking-[0.3em] uppercase">© 2026 DOUBLEU OFFICIAL • Oklahoma City</p>
            </div>
        </div>
    </main>

    <script src="/engine.js"></script>
    <script>
        // Specific logic for the single page
        async function loadSingle() {
            const params = new URLSearchParams(window.location.search);
            const songSlug = params.get('song'); 
            
            const response = await fetch('/music.json');
            const music = await response.json();
            const song = music.find(s => s.path.includes(songSlug));

            if (!song) {
                window.location.href = '/music';
                return;
            }

            // Update UI
            document.title = `${song.title} | DoubleU`;
            document.getElementById('song-title').innerText = song.title;
            document.getElementById('song-cover').src = song.cover_url;
            document.getElementById('bg-layer').style.backgroundImage = `url(${song.cover_url})`;
            document.getElementById('song-date').innerText = `Released ${new Date(song.release_date).getFullYear()}`;

            // Build Links (Only if not NULL/undefined)
            const linksGrid = document.getElementById('links-container');
            const platforms = [
                { name: 'Spotify', icon: 'fa-spotify', link: song.spotify_url },
                { name: 'Apple Music', icon: 'fa-apple', link: song.apple_url },
                { name: 'YouTube', icon: 'fa-youtube', link: song.youtube_url }
            ];

            linksGrid.innerHTML = platforms
                .filter(p => p.link && p.link !== "NULL")
                .map(p => `
                    <a href="${p.link}" target="_blank" class="glass-card flex items-center justify-between p-4 rounded-lg group hover:bg-white/10 transition-all">
                        <span class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-widest">
                            <i class="fab ${p.icon} text-lg"></i> ${p.name}
                        </span>
                        <i class="fas fa-external-link-alt text-[8px] opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </a>
                `).join('');
        }
        
        document.addEventListener('DOMContentLoaded', loadSingle);
    </script>
</body>
</html>
