<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body { background: #000; overflow: hidden; color: white; cursor: none; }
        #cursor {
            width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen; transition: transform 0.1s;
        }
        #transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        body.is-transitioning #transition-layer { opacity: 1; }
        .glitch { font-family: 'Inter', sans-serif; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; filter: brightness(1); } 50% { opacity: 0.7; filter: brightness(1.5); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div id="cursor"></div>
    <div id="transition-layer"></div>

    <div class="text-center space-y-8">
        <h1 class="glitch text-white text-7xl md:text-9xl font-black italic tracking-tighter transition-all duration-500 hover:text-cyan-500">
            DOUBLEU
        </h1>
        <div class="pt-4">
            <a href="/home" class="group relative px-12 py-4 text-white uppercase tracking-[0.5em] text-[10px] font-bold border border-white/20 hover:border-cyan-500 transition-all">
                <span class="relative z-10">Enter Experience</span>
            </a>
        </div>
    </div>
    <script src="/engine.js"></script>
</body>
</html>
