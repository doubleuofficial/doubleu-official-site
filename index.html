<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU Official | Enter the 405</title>
    <meta name="description" content="Official entrance to the DoubleU movement. Experience Oklahoma City Soul-Trap.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; }
        .main-w { font-size: 12rem; font-weight: 900; font-style: italic; color: white; letter-spacing: -10px; animation: glitch 500ms infinite; }
        .terminal-text { margin-top: 2rem; font-family: monospace; font-size: 10px; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 4px; }
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #ff0000, -0.05em -0.025em 0 #00ff00; }
            50% { text-shadow: -0.025em 0.05em 0 #ff0000, 0.05em 0 0 #0000ff; }
            100% { text-shadow: -0.025em 0 0 #ff0000, -0.025em -0.025em 0 #00ff00; }
        }
    </style>
</head>
<body>
    <div class="main-w">W</div>
    <div class="terminal-text" id="loading-msg">Initializing Identity</div>
    <script>
        const messages = ["Calibrating Sound", "Identity Confirmed", "Entering the 405"];
        let i = 0;
        const msgEl = document.getElementById('loading-msg');
        const interval = setInterval(() => {
            if (i < messages.length) { msgEl.innerText = messages[i++]; }
            else { clearInterval(interval); window.location.href = '/home'; }
        }, 800);
    </script>
</body>
</html>
