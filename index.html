<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* The W Logo Animation */
        .loader-logo {
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            position: relative;
            transform: rotate(-6deg);
            animation: pulse-glow 2s infinite alternate ease-in-out;
        }

        .loader-logo span {
            color: var(--neon-cyan);
            font-size: 3rem;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
                border-color: rgba(0, 242, 255, 0.4);
                transform: rotate(-6deg) scale(1);
            }
            100% {
                box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
                border-color: var(--neon-cyan);
                transform: rotate(-6deg) scale(1.05);
            }
        }

        /* Loading Bar */
        .progress-container {
            position: absolute;
            bottom: 20%;
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: progress-fill 2.5s forwards cubic-bezier(0.65, 0, 0.35, 1);
        }

        @keyframes progress-fill {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .status-text {
            position: absolute;
            bottom: calc(20% - 25px);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #444;
            animation: flicker 1.5s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="loader-logo">
        <span>W</span>
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="status-text">Initializing Identity</div>

    <script>
        // Redirect to home.html after the animation finishes
        window.addEventListener('load', () => {
            // Give the user a moment to see the full progress bar (2.5 seconds total)
            setTimeout(() => {
                // Fade out effect (optional)
                document.body.style.transition = "opacity 0.5s ease";
                document.body.style.opacity = "0";
                
                setTimeout(() => {
                    window.location.href = './home.html';
                }, 500);
            }, 2600); 
        });
    </script>
</body>
</html>
