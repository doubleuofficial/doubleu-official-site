<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoubleU // Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-[#050505] text-[#eee] overflow-x-hidden">
    <div class="film-grain"></div>

    <nav class="fixed top-0 w-full z-50 p-4 md:p-6 flex justify-between items-center bg-gradient-to-b from-black to-transparent">

        <div class="flex space-x-4 md:space-x-8 text-[9px] md:text-[10px] font-bold uppercase tracking-widest md:tracking-[0.3em]">

        <div class="flex flex-col sm:flex-row w-full max-w-xs sm:max-w-none justify-center gap-4">
            <a href="/music" class="w-full sm:w-auto bg-white text-black px-8 py-4 font-bold uppercase text-[10px] hover:bg-[#FF5F1F] transition text-center">

            </a>
            <a href="/single/a-place-to-land" class="w-full sm:w-auto border border-white/20 px-8 py-4 font-bold uppercase text-[10px] hover:border-cyan-400 hover:text-cyan-400 transition text-center">

    </section>

</html>
