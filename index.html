<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Loading...</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .brand-text {
            font-family: 'Inter', sans-serif;
            font-style: italic;
            letter-spacing: -0.05em;
            opacity: 0;
            transform: scale(0.95);
            animation: cinematicEntry 3.5s ease-in-out forwards;
        }

        @keyframes cinematicEntry {
            0% {
                opacity: 0;
                transform: scale(0.95);
                filter: blur(10px);
            }
            30% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }
            70% {
                opacity: 1;
                transform: scale(1.02);
                filter: blur(0px);
            }
            100% {
                opacity: 0;
                transform: scale(1.05);
                filter: blur(5px);
            }
        }

        /* Subtle neon pulse */
        .glow {
            color: white;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0);
            animation: pulseGlow 3.5s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            50% { text-shadow: 0 0 30px rgba(6, 182, 212, 0.4); }
        }
    </style>
</head>
<body>

    <div class="text-center">
        <h1 class="brand-text glow text-7xl md:text-9xl font-black italic tracking-tighter">
            DOUBLEU
        </h1>
        <p class="brand-text text-cyan-500 uppercase tracking-[0.8em] text-[10px] mt-4 font-light" style="animation-delay: 0.5s;">
            Oklahoma City
        </p>
    </div>

    <script>
        // Automatic redirection to home page after the animation finishes
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 3800); // Redirect slightly after the 3.5s animation ends
    </script>
</body>
</html>
