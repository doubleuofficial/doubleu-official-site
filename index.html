<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; overflow: hidden; }
        .glitch-w { font-size: clamp(8rem, 25vw, 15rem); font-weight: 900; font-style: italic; color: white; letter-spacing: -10px; animation: glitch 400ms infinite; }
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff00c1, -2px -2px #00fff9; transform: translate(2px, 0); }
            25% { text-shadow: -2px 0 #ff00c1, 2px 2px #00fff9; transform: translate(-2px, 0); }
            100% { text-shadow: 2px 0 #ff00c1, -2px -2px #00fff9; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">
    <div class="glitch-w">W</div>
    <div class="mt-4 font-mono text-[10px] uppercase tracking-[5px] text-cyan-400 opacity-70">Initiating 405 Protocol</div>
    <script>setTimeout(() => { window.location.href = '/home'; }, 1800);</script>
</body>
</html>
