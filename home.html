<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; cursor: none; }
        #cursor {
            width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen; transition: transform 0.1s;
        }
        #transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        body.is-transitioning #transition-layer { opacity: 1; }
        .hero-gradient { background: linear-gradient(to bottom, transparent, #050505); }
    </style>
</head>
<body class="selection:bg-cyan-500/30">
    <div id="cursor"></div>
    <div id="transition-layer"></div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/home" class="text-2xl font-black italic tracking-tighter">DOUBLEU</a>
            <div class="flex gap-8 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <a href="/music" class="hover:text-cyan-400">Music</a>
                <a href="/about" class="hover:text-cyan-400">About</a>
                <a href="/contact" class="hover:text-cyan-400">Contact</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="relative rounded-3xl overflow-hidden bg-white/5 border border-white/10 p-12 flex flex-col md:flex-row items-center gap-12">
                <div class="absolute top-6 left-6 bg-cyan-600 text-[9px] font-bold uppercase tracking-[0.3em] px-4 py-1 rounded-full">Upcoming Release</div>
                <img src="/assets/hero-bg.webp" class="w-64 h-64 rounded-lg shadow-2xl object-cover">
                <div class="space-y-4">
                    <h1 class="text-6xl font-black italic tracking-tighter uppercase">A Place To Land</h1>
                    <p class="text-gray-400 tracking-widest text-sm uppercase">Coming April 24, 2026</p>
                    <a href="#" class="inline-block px-10 py-4 bg-white text-black font-bold rounded-full text-[10px] uppercase tracking-widest hover:bg-cyan-500 transition-colors">Pre-Save Now</a>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-xs uppercase tracking-[0.5em] text-gray-600 mb-12 border-l-2 border-cyan-500 pl-4">Most Streamed</h2>
        <div id="most-streamed-grid" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
    </section>

    <script src="/engine.js"></script>
</body>
</html>
