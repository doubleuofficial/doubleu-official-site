<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .hero-gradient {
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0) 0%, #050505 100%);
        }

        /* Glassmorphism for cards */
        .music-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .music-card:hover {
            border-color: rgba(6, 182, 212, 0.4);
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500/30">

    <section class="relative h-[70vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="/assets/hero-bg.webp" alt="DoubleU Artist" class="w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>

        <div class="relative z-10 text-center space-y-4 px-6">
            <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter opacity-90">DOUBLEU</h1>
            <div class="flex items-center justify-center gap-4 text-cyan-400 tracking-[0.4em] text-xs md:text-sm uppercase font-light">
                <span>Oklahoma City</span>
                <span class="h-1 w-1 bg-white/20 rounded-full"></span>
                <span>Melodic Soul-Trap</span>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-4">
            <div class="space-y-2">
                <h2 class="text-4xl font-bold tracking-tight">Discography</h2>
                <div class="h-1 w-20 bg-cyan-600"></div>
            </div>
            <p class="text-gray-500 text-sm uppercase tracking-widest font-medium">Recent Releases</p>
        </div>

        <div id="music-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="animate-pulse space-y-4">
                <div class="aspect-square bg-white/5 rounded-lg"></div>
                <div class="h-4 w-2/3 bg-white/5 rounded"></div>
            </div>
            <div class="animate-pulse space-y-4 hidden sm:block">
                <div class="aspect-square bg-white/5 rounded-lg"></div>
                <div class="h-4 w-2/3 bg-white/5 rounded"></div>
            </div>
        </div>

    </main>

    <footer class="border-t border-white/5 py-24 bg-[#030303]">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center space-y-12">
            
            <div class="flex gap-10 text-3xl text-gray-500">
                <a href="https://open.spotify.com/artist/78gVqbaxxYAd9aLEZJ49YG" target="_blank" class="hover:text-[#1DB954] transition-all"><i class="fab fa-spotify"></i></a>
                <a href="https://music.apple.com/us/artist/doubleu/1586705800" target="_blank" class="hover:text-[#FC3C44] transition-all"><i class="fab fa-apple"></i></a>
                <a href="https://www.youtube.com/@DoubleUOTB" target="_blank" class="hover:text-[#FF0000] transition-all"><i class="fab fa-youtube"></i></a>
            </div>

            <div class="text-center space-y-2">
                <p class="text-gray-600 text-[10px] tracking-[0.5em] uppercase font-bold">&copy; 2026 DOUBLEU OFFICIAL</p>
                <p class="text-gray-800 text-[10px] uppercase">Designed for Oklahoma City's Own</p>
            </div>
        </div>
    </footer>

    <script src="/engine.js"></script>

</body>
</html>
