<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Home</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        
        .hero-vignette {
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, #050505 100%);
        }
        
        .nav-blur {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
        }

        /* Cinematic Grain Effect */
        .grain::before {
            content: "";
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            filter: brightness(100%) contrast(150%);
            pointer-events: none;
            opacity: 0.05;
        }
    </style>
</head>
<body class="antialiased grain">

    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/home.html" class="text-2xl font-black italic tracking-tighter">DOUBLEU</a>
            
            <div class="flex gap-10 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <a href="/music.html" class="hover:text-cyan-400 transition-colors">Music</a>
                <a href="/about.html" class="hover:text-cyan-400 transition-colors">About</a>
                <a href="/contact.html" class="hover:text-cyan-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="/assets/hero-main.webp" alt="DoubleU Artist" class="w-full h-full object-cover opacity-40 scale-110">
            <div class="absolute inset-0 hero-vignette"></div>
        </div>

        <div class="relative z-10 text-center px-6">
            <h1 class="text-8xl md:text-[12rem] font-black italic tracking-tighter leading-none opacity-90 mb-4">
                DOUBLEU
            </h1>
            <div class="flex items-center justify-center gap-6">
                <div class="h-[1px] w-12 bg-cyan-500/50"></div>
                <p class="text-cyan-400 tracking-[0.6em] uppercase text-xs font-light">Oklahoma City Soul-Trap</p>
                <div class="h-[1px] w-12 bg-cyan-500/50"></div>
            </div>
        </div>

        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-20">
            <i class="fas fa-chevron-down text-xl"></i>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-32">
        <div class="mb-16">
            <h2 class="text-4xl font-black italic mb-2">LATEST PROJECTS</h2>
            <p class="text-gray-500 text-xs uppercase tracking-widest">Selected Discography</p>
        </div>

        <div id="music-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="animate-pulse space-y-4">
                <div class="aspect-square bg-white/5 rounded-lg"></div>
                <div class="h-4 w-1/2 bg-white/5 rounded"></div>
            </div>
            <div class="animate-pulse space-y-4 hidden sm:block">
                <div class="aspect-square bg-white/5 rounded-lg"></div>
                <div class="h-4 w-1/2 bg-white/5 rounded"></div>
            </div>
        </div>

        <div class="mt-20 text-center">
            <a href="/music.html" class="inline-block border border-white/10 px-12 py-4 rounded-full text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-white hover:text-black transition-all duration-500">
                View All Music
            </a>
        </div>
    </main>

    <footer class="border-t border-white/5 py-24 bg-[#030303]">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            <div class="flex gap-12 text-2xl text-gray-600 mb-12">
                <a href="https://open.spotify.com/artist/78gVqbaxxYAd9aLEZJ49YG" target="_blank" class="hover:text-[#1DB954] transition-colors"><i class="fab fa-spotify"></i></a>
                <a href="https://music.apple.com/us/artist/doubleu/1586705800" target="_blank" class="hover:text-[#FC3C44] transition-colors"><i class="fab fa-apple"></i></a>
                <a href="https://www.youtube.com/@DoubleUOTB" target="_blank" class="hover:text-[#FF0000] transition-colors"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="text-gray-800 text-[10px] tracking-[0.8em] uppercase font-bold">© 2026 DoubleU • Faded 405</p>
        </div>
    </footer>

    <script src="/engine.js"></script>
</body>
</html>
