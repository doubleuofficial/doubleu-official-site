<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: white; -webkit-font-smoothing: antialiased; }
        .hero-title { line-height: 0.8; letter-spacing: -0.05em; }
        .nav-blur { backdrop-filter: blur(10px); background: rgba(5,5,5,0.8); }
    </style>
</head>
<body class="selection:bg-cyan-400 selection:text-black">
    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-white/5 py-6 px-8 flex justify-between items-center">
        <a href="/home" id="config-site_name" class="text-xl font-black italic tracking-tighter uppercase">DoubleU</a>
        <div class="flex gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="/music" class="hover:text-cyan-400 transition">Music</a>
            <a href="/mediakit" class="hover:text-cyan-400 transition">EPK</a>
            <a href="/contact" class="hover:text-cyan-400 transition">Contact</a>
        </div>
    </nav>

    <header class="min-h-screen flex flex-col justify-center px-8 md:px-20 pt-20">
        <div class="max-w-7xl mx-auto w-full grid md:grid-cols-2 gap-16 items-center">
            <div>
                <h4 class="text-cyan-400 uppercase tracking-[12px] text-[10px] font-bold mb-6">Oklahoma City // 405</h4>
                <h1 class="hero-title text-7xl md:text-[10rem] font-black italic uppercase mb-8">FADED<br>405</h1>
                <p id="config-hero_bio" class="text-gray-400 text-lg md:text-xl leading-relaxed italic max-w-lg mb-12 border-l border-cyan-400/30 pl-6">Loading transmission...</p>
                <div class="flex gap-4">
                    <a id="config-spotify_url" href="#" target="_blank" class="px-10 py-5 bg-white text-black font-black uppercase text-[10px] tracking-[5px] hover:bg-cyan-400 transition">Spotify</a>
                    <a id="config-apple_url" href="#" target="_blank" class="px-10 py-5 border border-white/20 font-black uppercase text-[10px] tracking-[5px] hover:border-white transition">Apple</a>
                </div>
            </div>
            <div class="relative">
                <img id="config-hero_img" src="" class="w-full aspect-[4/5] object-cover grayscale hover:grayscale-0 transition duration-1000 rounded-sm">
            </div>
        </div>
    </header>

    <section class="py-32 px-8 md:px-20 bg-[#080808]">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-16">The Archive</h2>
            <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
                </div>
        </div>
    </section>

    <script src="/js/engine.js"></script>
</body>
</html>
