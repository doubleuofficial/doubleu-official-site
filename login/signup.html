<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doubleU | Create Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-orange: #ff8c00;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 140, 0, 0.08) 0%, transparent 40%),
                linear-gradient(180deg, #050505 0%, #0a0a0a 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .neon-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .neon-input:focus {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        .btn-glow {
            background: var(--neon-cyan);
            color: #000;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Custom scrollbar for better noir feel */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    
    <div class="max-w-md w-full glass-panel rounded-3xl p-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 border-2 border-[var(--neon-cyan)] rounded-2xl mb-4 transform rotate-3 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <span class="text-[var(--neon-cyan)] text-3xl font-bold italic">W</span>
            </div>
            <h1 class="text-3xl font-bold tracking-widest uppercase">Create Identity</h1>
            <p class="text-gray-400 text-sm mt-2">Join the DoubleU Official Collective</p>
        </div>

        <div id="statusMessage" class="hidden mb-6 p-4 text-xs rounded-xl"></div>

        <form id="signupForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase mb-2 ml-1 tracking-widest">First Name</label>
                    <input type="text" id="firstName" placeholder="John" required class="neon-input w-full px-5 py-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase mb-2 ml-1 tracking-widest">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe" required class="neon-input w-full px-5 py-3 rounded-xl">
                </div>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase mb-2 ml-1 tracking-widest">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required class="neon-input w-full px-5 py-3 rounded-xl">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase mb-2 ml-1 tracking-widest">Security Key</label>
                <input type="password" id="password" placeholder="••••••••" required class="neon-input w-full px-5 py-3 rounded-xl">
            </div>

            <button type="submit" class="btn-glow w-full font-bold py-4 rounded-xl active:scale-95 mt-4">
                Initialize Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            Already a member? <a href="login.html" class="font-bold text-[var(--neon-orange)] hover:underline">Authorize Here</a>
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpwgzassajhmlqrjyyon.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fmzJd-HdlmXiJNZHKn8irg_RvMQBLP6';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const signupForm = document.getElementById('signupForm');
        const statusDiv = document.getElementById('statusMessage');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDiv.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            // 1. Sign up with Supabase
            const { data, error } = await _supabase.auth.signUp({
                email,
                password,
                options: {
                    // Optional: Store first/last name in user metadata
                    data: {
                        first_name: firstName,
                        last_name: lastName
                    }
                }
            });

            if (error) {
                statusDiv.innerText = error.message;
                statusDiv.className = "mb-6 p-4 bg-red-900/30 border border-red-500/50 text-red-200 text-xs rounded-xl";
                statusDiv.classList.remove('hidden');
            } else {
                statusDiv.innerText = "Identity Created! Please check your email for confirmation.";
                statusDiv.className = "mb-6 p-4 bg-cyan-900/30 border border-cyan-500/50 text-cyan-200 text-xs rounded-xl";
                statusDiv.classList.remove('hidden');
                signupForm.reset();
            }
        });
    </script>
</body>
</html>
