<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Media Kit (EPK)</title>
    <meta name="robots" content="noindex">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; }
        .section-header { writing-mode: vertical-rl; text-transform: uppercase; letter-spacing: 10px; font-size: 0.75rem; color: #333; }
    </style>
</head>
<body class="p-6 md:p-20">
    <header class="max-w-6xl mx-auto mb-32 flex justify-between items-end">
        <div>
            <h4 class="text-[var(--neon-cyan)] uppercase tracking-[10px] text-xs font-bold mb-4 italic">Press Kit</h4>
            <h1 class="text-7xl md:text-9xl font-black italic uppercase leading-none">DoubleU</h1>
        </div>
        <div class="text-right text-xs uppercase tracking-widest text-gray-600">2026 Asset Portal</div>
    </header>

    <main class="max-w-6xl mx-auto space-y-40">
        <section class="flex gap-12">
            <div class="section-header">Biography</div>
            <p class="text-2xl md:text-4xl font-light leading-snug text-gray-300 italic">
                The bridge between <span class="text-white font-bold">Pain Music</span> and cinematic production. Born and bred in <span class="text-[var(--neon-cyan)] font-bold">OKC</span>.
            </p>
        </section>

        <section class="flex gap-12">
            <div class="section-header">Resources</div>
            <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-8">
                <a href="mailto:sync@doubleuofficial.online" class="p-10 border border-white/5 rounded-2xl hover:border-[var(--neon-cyan)] transition-all">
                    <h5 class="text-[10px] uppercase tracking-widest mb-2 text-gray-500">Booking</h5>
                    <span class="text-xl font-bold">sync@doubleuofficial.online</span>
                </a>
                <div class="p-10 border border-white/5 rounded-2xl">
                    <h5 class="text-[10px] uppercase tracking-widest mb-2 text-gray-500">Asset Pack</h5>
                    <span class="text-xl font-bold">Download High-Res Photos (ZIP)</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
