<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; cursor: none; overflow-x: hidden; }
        
        /* Cinematic Cursor */
        #cursor {
            width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen; transition: transform 0.1s;
        }

        /* Noir Aesthetics */
        .noir-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .noir-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
            transform: translateY(-5px);
            background: rgba(6, 182, 212, 0.02);
        }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-cyan-500/30">
    <div id="cursor"></div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-6 px-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/home" class="text-2xl font-black italic tracking-tighter hover:text-cyan-400 transition-colors">DOUBLEU</a>
            <div class="flex gap-10 text-[9px] uppercase tracking-[0.4em] font-bold text-gray-500">
                <a href="/home" class="hover:text-white transition-colors">Home</a>
                <a href="/music" class="text-white border-b border-cyan-500 pb-1">Music</a>
                <a href="/about" class="hover:text-white transition-colors">About</a>
                <a href="/contact" class="hover:text-white transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-24 space-y-32">
        
        <section id="featured-section">
            <div class="mb-10 flex items-center gap-4">
                <div class="h-[1px] w-12 bg-cyan-500"></div>
                <h2 class="text-[10px] uppercase tracking-[0.6em] text-cyan-500 font-bold">Featured Project</h2>
            </div>
            <div id="featured-album-container">
                </div>
        </section>

        <section>
            <div class="mb-10 flex items-center gap-4">
                <div class="h-[1px] w-12 bg-gray-700"></div>
                <h2 class="text-[10px] uppercase tracking-[0.6em] text-gray-500 font-bold">Discography</h2>
            </div>
            <div id="singles-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                </div>
        </section>

    </main>

    <script>
        async function loadMusic() {
            try {
                const response = await fetch('/music.json');
                const music = await response.json();

                // 1. Sort by Date (Newest First)
                music.sort((a, b) => new Date(b.release_date) - new Date(a.release_date));

                // 2. Render Featured (The latest Album)
                const featuredContainer = document.getElementById('featured-album-container');
                const album = music.find(m => m.type === 'Album');
                
                if (album) {
                    featuredContainer.innerHTML = `
                        <div class="noir-card rounded-3xl overflow-hidden flex flex-col lg:flex-row p-8 lg:p-12 gap-12 items-center">
                            <div class="w-full lg:w-1/2 relative group">
                                <img src="${album.cover_url}" class="w-full aspect-square object-cover rounded-xl shadow-2xl transition-transform duration-700 group-hover:scale-[1.02]">
                                <div class="absolute -inset-4 bg-cyan-500/10 blur-3xl -z-10 opacity-50"></div>
                            </div>
                            <div class="flex-1 space-y-6">
                                <h3 class="text-6xl lg:text-8xl font-black italic tracking-tighter leading-none uppercase">${album.title}</h3>
                                <p class="text-gray-400 text-sm tracking-widest uppercase">The Full Album Experience • ${new Date(album.release_date).getFullYear()}</p>
                                <div class="pt-6">
                                    <a href="${album.path}" class="inline-block bg-white text-black font-black px-10 py-4 text-[10px] uppercase tracking-[0.3em] rounded-full hover:bg-cyan-500 hover:text-white transition-all">Explore Project</a>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 3. Render Grid (Singles)
                const grid = document.getElementById('singles-grid');
                const singles = music.filter(m => m.type === 'Single' || m.type === 'EP');

                grid.innerHTML = singles.map(item => `
                    <a href="${item.path}" class="noir-card group p-4 rounded-2xl block">
                        <div class="relative overflow-hidden rounded-xl mb-4">
                            <img src="${item.cover_url}" class="w-full aspect-square object-cover grayscale group-hover:grayscale-0 transition-all duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="text-[9px] font-black uppercase tracking-[0.4em] border border-white/40 px-4 py-2">Listen</span>
                            </div>
                        </div>
                        <div class="px-2">
                            <h4 class="text-[11px] font-bold uppercase tracking-[0.2em] truncate">${item.title}</h4>
                            <p class="text-[9px] text-gray-500 mt-1 uppercase tracking-widest">${new Date(item.release_date).getFullYear()} • ${item.type}</p>
                        </div>
                    </a>
                `).join('');

            } catch (err) {
                console.error("Failed to load catalog:", err);
            }
        }

        // Custom Cursor Movement
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });

        document.addEventListener('DOMContentLoaded', loadMusic);
    </script>
</body>
</html>
