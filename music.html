<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | DoubleU Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .blur-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); }
        .album-card { background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body class="antialiased pt-32">

    <nav class="fixed top-0 w-full z-50 blur-nav border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/home.html" class="text-2xl font-black italic tracking-tighter hover:text-cyan-400 transition-colors">DOUBLEU</a>
            
            <div class="flex gap-6 md:gap-10 text-[10px] uppercase tracking-[0.3em] font-bold">
                <a href="/home.html" class="hover:text-cyan-400 transition-colors">Home</a>
                <a href="/music.html" class="text-cyan-400">Music</a>
                <a href="/about.html" class="hover:text-cyan-400 transition-colors">About</a>
                <a href="/contact.html" class="hover:text-cyan-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        
        <section class="mb-24">
            <div class="flex items-center gap-4 mb-8">
                <h2 class="text-xs uppercase tracking-[0.5em] text-gray-500 font-bold">Featured Project</h2>
                <div class="h-[1px] flex-grow bg-white/5"></div>
            </div>

            <div id="featured-album-container">
                <div class="animate-pulse flex flex-col md:flex-row gap-12 p-8 border border-white/5 rounded-2xl">
                    <div class="w-full md:w-1/2 aspect-square bg-white/5 rounded-lg"></div>
                    <div class="w-full md:w-1/2 space-y-4 py-8">
                        <div class="h-12 w-3/4 bg-white/5 rounded"></div>
                        <div class="h-4 w-full bg-white/5 rounded"></div>
                        <div class="h-4 w-5/6 bg-white/5 rounded"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-4 mb-12">
                <h2 class="text-xs uppercase tracking-[0.5em] text-gray-500 font-bold">Singles & Releases</h2>
                <div class="h-[1px] flex-grow bg-white/5"></div>
            </div>

            <div id="singles-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12">
                </div>
        </section>

    </main>

    <footer class="border-t border-white/5 py-20 bg-[#030303]">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-gray-600 text-[9px] tracking-[0.6em] uppercase mb-4">Oklahoma City • 405</p>
            <div class="flex justify-center gap-8 mb-8 text-xl text-gray-500">
                <a href="#" class="hover:text-cyan-400 transition-colors"><i class="fab fa-spotify"></i></a>
                <a href="#" class="hover:text-cyan-400 transition-colors"><i class="fab fa-apple"></i></a>
                <a href="#" class="hover:text-cyan-400 transition-colors"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="/engine.js"></script>
</body>
</html>
