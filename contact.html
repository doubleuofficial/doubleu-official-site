<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; cursor: none; }
        #cursor {
            width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen; transition: transform 0.1s;
        }
        #transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        body.is-transitioning #transition-layer { opacity: 1; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="transition-layer"></div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/home" class="text-2xl font-black italic tracking-tighter">DOUBLEU</a>
            <div class="flex gap-8 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <a href="/home" class="hover:text-cyan-400">Home</a>
                <a href="/music" class="hover:text-cyan-400">Music</a>
                <a href="/about" class="hover:text-cyan-400">About</a>
                <a href="/contact" class="text-cyan-400">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-40 pb-24">
        <div class="text-center mb-12 space-y-4">
            <h1 class="text-6xl font-black italic tracking-tighter uppercase">Contact</h1>
            <p id="mgmt-email" class="text-cyan-500 font-bold tracking-widest text-xs uppercase"></p>
        </div>
        <form class="space-y-6 bg-white/[0.02] p-8 md:p-12 border border-white/10 rounded-3xl">
            <input type="text" placeholder="NAME" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-cyan-500 outline-none text-[10px] tracking-widest text-white">
            <input type="email" placeholder="EMAIL" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-cyan-500 outline-none text-[10px] tracking-widest text-white">
            <textarea rows="4" placeholder="MESSAGE" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-cyan-500 outline-none text-[10px] tracking-widest text-white"></textarea>
            <button class="w-full bg-white text-black font-black py-5 uppercase tracking-[0.4em] text-[10px] hover:bg-cyan-500 transition-colors">Send Inquiry</button>
        </form>
    </main>
    <script src="/engine.js"></script>
</body>
</html>
