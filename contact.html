<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center min-h-screen p-8">
    <div class="max-w-6xl w-full mx-auto grid md:grid-cols-2 gap-24">
        
        <div class="space-y-6">
            <h1 class="text-8xl font-black italic uppercase tracking-tighter leading-none">Connect</h1>
            <div class="h-1 w-24 bg-cyan-500"></div>
            <p class="text-gray-500 uppercase tracking-[0.3em] text-[10px] font-bold">For features, booking, and production inquiries.</p>
        </div>

        <div class="flex flex-col justify-center space-y-12">
            <div class="group">
                <label class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold block mb-2">Email Address</label>
                <a id="email-link" href="#" class="text-3xl md:text-4xl font-light hover:text-cyan-400 transition-all underline decoration-gray-800 underline-offset-8"></a>
            </div>

            <div class="group">
                <label class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold block mb-2">Direct / Management</label>
                <p id="phone-text" class="text-3xl md:text-4xl font-light tracking-tighter"></p>
            </div>
            
            <div class="pt-8 border-t border-white/5 flex gap-8">
                <a href="/about" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-500">Read Bio</a>
                <a href="/discography" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-500">View Catalog</a>
            </div>
        </div>
    </div>

    <script>
        async function loadContact() {
            const res = await fetch('/config.json');
            const cfg = await res.json();
            
            const emailEl = document.getElementById('email-link');
            emailEl.innerText = cfg.email;
            emailEl.href = `mailto:${cfg.email}`;
            
            document.getElementById('phone-text').innerText = cfg.phone;
        }
        loadContact();
    </script>
</body>
</html>
