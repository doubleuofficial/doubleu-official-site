<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white">
    <nav class="p-8"><a href="/home" class="text-xl font-black italic tracking-tighter uppercase">DoubleU</a></nav>

    <main class="max-w-2xl mx-auto px-8 py-20 text-center md:text-left">
        <h1 class="text-6xl font-black italic uppercase tracking-tighter mb-12">Contact</h1>
        <form class="space-y-8">
            <input type="text" placeholder="NAME" class="w-full bg-transparent border-b border-white/10 p-4 text-[10px] tracking-widest focus:border-cyan-400 outline-none transition uppercase">
            <input type="email" placeholder="EMAIL" class="w-full bg-transparent border-b border-white/10 p-4 text-[10px] tracking-widest focus:border-cyan-400 outline-none transition uppercase">
            <textarea rows="4" placeholder="MESSAGE" class="w-full bg-transparent border-b border-white/10 p-4 text-[10px] tracking-widest focus:border-cyan-400 outline-none transition uppercase"></textarea>
            <button class="w-full bg-white text-black py-6 font-black uppercase text-[11px] tracking-[6px] hover:bg-cyan-400 transition">Send Transmission</button>
        </form>
        <div class="mt-16 text-[9px] text-gray-600 uppercase tracking-[4px]">
            Direct: sync@doubleuofficial.online
        </div>
    </main>
</body>
</html>
