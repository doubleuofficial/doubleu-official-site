<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Album Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; cursor: none; overflow-x: hidden; }
        #cursor { width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: screen; transition: transform 0.1s; }
        .dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(120px) brightness(0.15); opacity: 0.8; z-index: -1; }
        .track-item.active { border-left: 2px solid #06b6d4; background: rgba(6, 182, 212, 0.05); color: white; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="bg-layer" class="dynamic-bg"></div>

    <nav class="fixed top-0 w-full z-50 py-8 px-10 flex justify-between">
        <a href="/music" class="text-[9px] uppercase tracking-[0.6em] font-bold text-gray-500 hover:text-cyan-400 transition-colors"><i class="fas fa-chevron-left mr-2"></i> Catalog</a>
        <h2 id="album-header" class="text-[9px] uppercase tracking-[0.6em] font-bold text-cyan-500"></h2>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-10 grid lg:grid-cols-12 gap-16">
        <div class="lg:col-span-3 space-y-4">
            <h3 class="text-[10px] uppercase tracking-[0.4em] text-gray-600 mb-6 font-bold">Project Tracklist</h3>
            <div id="tracklist" class="space-y-2"></div>
        </div>

        <div class="lg:col-span-9 flex flex-col md:flex-row gap-16 items-center">
            <img id="song-cover" src="" class="w-full md:w-1/2 aspect-square object-cover rounded-2xl shadow-2xl">
            <div class="space-y-8 flex-1">
                <div class="space-y-2">
                    <p id="song-title" class="text-6xl md:text-8xl font-black italic tracking-tighter uppercase"></p>
                    <p id="album-sub" class="text-gray-500 text-[10px] font-bold tracking-[0.5em] uppercase"></p>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const albumSlug = urlParams.get('album');
            const songSlug = urlParams.get('song');
            
            const res = await fetch('/music.json');
            const music = await res.json();

            // Find all songs in this album
            const albumTracks = music.filter(s => s.path.includes(`album=${albumSlug}`));
            const currentSong = albumTracks.find(s => s.path.includes(`song=${songSlug}`)) || albumTracks[0];

            if (currentSong) {
                document.getElementById('song-title').innerText = currentSong.title;
                document.getElementById('song-cover').src = currentSong.cover_url;
                document.getElementById('bg-layer').style.backgroundImage = `url(${currentSong.cover_url})`;
                document.getElementById('album-header').innerText = albumSlug.replace(/-/g, ' ');
                document.getElementById('album-sub').innerText = `From the project: ${albumSlug.replace(/-/g, ' ')}`;

                // Render Tracklist
                document.getElementById('tracklist').innerHTML = albumTracks.map(t => `
                    <a href="${t.path}" class="track-item block p-4 rounded-lg text-[10px] uppercase tracking-widest text-gray-500 hover:text-white transition-all ${t.title === currentSong.title ? 'active' : ''}">
                        ${t.title}
                    </a>
                `).join('');

                // Render Links
                const container = document.getElementById('links-container');
                const platforms = [
                    { name: 'Spotify', icon: 'fa-spotify', link: currentSong.spotify_url },
                    { name: 'Apple Music', icon: 'fa-apple', link: currentSong.apple_url },
                    { name: 'YouTube', icon: 'fa-youtube', link: currentSong.youtube_url }
                ];
                container.innerHTML = platforms.filter(p => p.link && p.link !== "NULL").map(p => `
                    <a href="${p.link}" target="_blank" class="flex items-center justify-between p-5 rounded-xl border border-white/5 bg-white/[0.02] group hover:bg-white/5 transition-all">
                        <span class="text-[11px] font-bold uppercase tracking-[0.2em]"><i class="fab ${p.icon} text-lg mr-4"></i> ${p.name}</span>
                        <i class="fas fa-external-link-alt text-[8px] text-cyan-400 opacity-0 group-hover:opacity-100 transition-all"></i>
                    </a>
                `).join('');
            }
        }
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            if(c) { c.style.left = e.clientX - 10 + 'px'; c.style.top = e.clientY - 10 + 'px'; }
        });
        init();
    </script>
</body>
</html>
