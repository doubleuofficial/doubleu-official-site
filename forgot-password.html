<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doubleU | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-100 text-indigo-600 rounded-full mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m11-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-slate-800 mb-2">Reset Password</h1>
        <p class="text-slate-500 text-sm mb-8 px-4">Enter your email and we'll send you a link to reset your password.</p>

        <form action="/auth/reset" method="POST" class="space-y-5">
            <div class="text-left">
                <label class="block text-xs font-semibold text-slate-600 uppercase mb-1 ml-1">Account Email</label>
                <input type="email" placeholder="you@example.com" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Send Link</button>
        </form>

        <div class="mt-8">
            <a href="login.html" class="text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors">← Back to Login</a>
        </div>
    </div>
</body>
</html>
