<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; }
        .grid-item { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .grid-item:hover { transform: translateY(-10px); }
        .img-container { position: relative; overflow: hidden; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .img-container img { filter: grayscale(100%); transition: filter 0.8s ease; }
        .grid-item:hover img { filter: grayscale(0%); border-color: var(--neon-cyan); }
    </style>
</head>
<body class="p-8 md:p-24">

    <header class="mb-20">
        <h1 class="text-6xl font-black italic tracking-tighter uppercase mb-4">Discography</h1>
        <p class="text-[10px] uppercase tracking-[8px] text-gray-500">Official Releases & Archives</p>
    </header>

    <section class="mb-32">
        <h2 class="text-[9px] uppercase tracking-[12px] text-gray-600 mb-12 border-b border-white/5 pb-6">Major Projects</h2>
        <div id="albums-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
            </div>
    </section>

    <section>
        <h2 class="text-[9px] uppercase tracking-[12px] text-gray-600 mb-12 border-b border-white/5 pb-6">Singles</h2>
        <div id="singles-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
            </div>
    </section>

    <script>
        const _supabaseUrl = 'YOUR_SUPABASE_URL';
        const _supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

        async function init() {
            const { data: releases, error } = await supabase
                .from('releases')
                .select('*')
                .order('release_date', { ascending: false });

            if (error) return console.error(error.message);

            const albumsGrid = document.getElementById('albums-grid');
            const singlesGrid = document.getElementById('singles-grid');

            releases.forEach(item => {
                // Construct path: /music/album/filename or /music/single/filename
                const folder = item.type?.toLowerCase() === 'album' ? 'album' : 'single';
                const finalUrl = `./${folder}/${item.path}`;

                const html = `
                    <a href="${finalUrl}" class="grid-item group block">
                        <div class="img-container mb-6 shadow-2xl">
                            <img src="${item.cover_url}" class="w-full aspect-square object-cover">
                        </div>
                        <h3 class="font-black italic uppercase tracking-tighter ${item.type==='album' ? 'text-2xl' : 'text-xs'}">${item.title}</h3>
                        <p class="text-[8px] text-gray-500 uppercase tracking-[3px] mt-2">${new Date(item.release_date).getFullYear()}</p>
                    </a>
                `;

                if (item.type?.toLowerCase() === 'album') {
                    albumsGrid.innerHTML += html;
                } else {
                    singlesGrid.innerHTML += html;
                }
            });
        }
        init();
    </script>
</body>
</html>
