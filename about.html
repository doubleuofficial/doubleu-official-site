<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; cursor: none; }
        #cursor {
            width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen; transition: transform 0.1s;
        }
        #transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        body.is-transitioning #transition-layer { opacity: 1; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="transition-layer"></div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/home" class="text-2xl font-black italic tracking-tighter">DOUBLEU</a>
            <div class="flex gap-8 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <a href="/home" class="hover:text-cyan-400">Home</a>
                <a href="/music" class="hover:text-cyan-400">Music</a>
                <a href="/about" class="text-cyan-400">About</a>
                <a href="/contact" class="hover:text-cyan-400">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-40 pb-24 grid md:grid-cols-2 gap-20 items-center">
        <img src="/assets/profile.webp" class="rounded-2xl grayscale hover:grayscale-0 transition-all duration-700 border border-white/10">
        <div class="space-y-6">
            <h1 class="text-7xl font-black italic tracking-tighter uppercase">The Voice of <span class="text-cyan-500">The 405</span></h1>
            <p class="text-gray-400 leading-relaxed text-lg">Hailing from Oklahoma City, DoubleU captures the cinematic grit of the streets through melodic soul-trap. This is pain music designed for the midnight drive.</p>
        </div>
    </main>
    <script src="/engine.js"></script>
</body>
</html>
