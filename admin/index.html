<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gateway | DoubleU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div id="loader">Checking Authorization...</div>

    <script>
        const SUPABASE_URL = 'https://xpwgzassajhmlqrjyyon.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fmzJd-HdlmXiJNZHKn8irg_RvMQBLP6';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            // Get the current session from Supabase
            const { data: { session }, error } = await _supabase.auth.getSession();

            if (session) {
                // If logged in, proceed to the dashboard
                window.location.href = './dashboard.html';
            } else {
                // If not logged in, redirect to the login page
                window.location.href = './login.html';
            }
        }

        // Run check on load
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
