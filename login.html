<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doubleU | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-orange: #ff8c00;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 140, 0, 0.08) 0%, transparent 40%),
                linear-gradient(180deg, #050505 0%, #0a0a0a 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .neon-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .neon-input:focus {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        .btn-glow {
            background: var(--neon-cyan);
            color: #000;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    
    <div class="max-w-md w-full glass-panel rounded-3xl p-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 border-2 border-[var(--neon-cyan)] rounded-2xl mb-4 transform -rotate-6 shadow-[0_0_15px_rgba(0,242,255,0.4)]">
                <span class="text-[var(--neon-cyan)] text-3xl font-bold italic">W</span>
            </div>
            <h1 class="text-3xl font-bold tracking-widest uppercase">Admin Login</h1>
            <p class="text-gray-400 text-sm mt-2">DoubleU Official Management Portal</p>
        </div>

        <div id="errorMessage" class="hidden mb-6 p-4 bg-red-900/30 border border-red-500/50 text-red-200 text-xs rounded-xl"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase mb-2 ml-1 tracking-widest">Master Identity</label>
                <input type="email" id="email" placeholder="admin@doubleuofficial.online" required 
                    class="neon-input w-full px-5 py-4 rounded-xl">
            </div>
            
            <div>
                <div class="flex justify-between mb-2 ml-1">
                    <label class="block text-[10px] font-bold text-[var(--neon-cyan)] uppercase tracking-widest">Security Key</label>
                    <a href="#" class="text-[10px] font-bold text-[var(--neon-orange)] uppercase hover:underline">Lost?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="neon-input w-full px-5 py-4 rounded-xl">
            </div>

            <button type="submit" class="btn-glow w-full font-bold py-4 rounded-xl active:scale-95">
                Authorize Session
            </button>
        </form>

        <div class="text-center mt-10">
            <p class="text-xs text-gray-500 tracking-tighter uppercase">
                &copy; 2026 DoubleU Official &bull; Oklahoma City
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpwgzassajhmlqrjyyon.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fmzJd-HdlmXiJNZHKn8irg_RvMQBLP6';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            } else {
                window.location.href = './dashboard.html';
            }
        });
    </script>
</body>
</html>
